biography: |
Hi! I'm Siwei Chen, an incoming M.S. student at the Institute of Information Engineering,
University of Chinese Academy of Sciences (UCAS).

My research interests include Large Language Models, LLM Alignment,
AI Security, and Agent Systems.

I have experience with model fine-tuning and post-training techniques
such as SFT, DPO, LoRA, and QLoRA.

Currently, I am exploring efficient post-training, alignment,
and evaluation methods for large language models.

